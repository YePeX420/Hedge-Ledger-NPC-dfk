<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hedge Ledger Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
      width: 340px;
      min-height: 200px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
    }
    .header-title { font-size: 14px; font-weight: 600; color: #a78bfa; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
      flex-shrink: 0;
    }
    .status-connected { background: #10b981; box-shadow: 0 0 6px #10b98180; }
    .status-joined { background: #3b82f6; box-shadow: 0 0 6px #3b82f680; }
    .status-connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-disconnected, .status-error { background: #ef4444; }
    .status-no_token, .status-invalid_token { background: #6b7280; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-row {
      display: flex; align-items: center;
      padding: 8px 14px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
      gap: 6px;
    }
    .status-label { font-size: 12px; color: #94a3b8; }
    .status-value { font-size: 12px; font-weight: 500; }
    .hunt-info {
      display: flex; gap: 16px;
      padding: 8px 14px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
    }
    .hunt-stat { text-align: center; }
    .hunt-stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
    .hunt-stat-value { font-size: 16px; font-weight: 600; color: #e2e8f0; }
    section {
      padding: 10px 14px;
      border-bottom: 1px solid #1e2535;
    }
    section:last-child { border-bottom: none; }
    .section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .8px; color: #64748b; margin-bottom: 8px;
    }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 6px 8px;
      background: #1e2535; border: 1px solid #2d3748; border-radius: 4px;
      color: #e2e8f0; font-size: 12px; font-family: monospace;
      outline: none;
    }
    input:focus { border-color: #4f46e5; }
    .input-row { display: flex; gap: 6px; margin-top: 4px; }
    .btn {
      padding: 5px 10px; border-radius: 4px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-ghost { background: #1e2535; color: #94a3b8; border: 1px solid #2d3748; }
    .btn-ghost:hover { background: #253047; color: #e2e8f0; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-danger:hover { background: #991b1b; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .toggle-label { font-size: 12px; color: #94a3b8; }
    .toggle {
      position: relative; width: 34px; height: 18px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #374151; border-radius: 9px;
      transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: #4f46e5; }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; transition: transform .2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }
    /* Recommendation card */
    .rec-card {
      background: #1a2035; border: 1px solid #2d3748;
      border-radius: 6px; padding: 10px;
    }
    .rec-empty { color: #4b5563; font-size: 12px; text-align: center; padding: 8px 0; }
    .rec-best {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 8px;
    }
    .rec-move { font-size: 13px; font-weight: 600; color: #a78bfa; }
    .rec-target { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .rec-score {
      font-size: 18px; font-weight: 700; color: #10b981;
      text-align: right;
    }
    .rec-score-label { font-size: 10px; color: #4b5563; }
    .rec-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .rec-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #1e2d40; color: #60a5fa; border: 1px solid #1e3a5f;
    }
    .rec-alts { border-top: 1px solid #2d3748; padding-top: 8px; }
    .rec-alt-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; padding: 2px 0;
    }
    .rec-alt-label { color: #64748b; }
    .rec-alt-name { color: #cbd5e1; }
    .rec-alt-score { color: #6b7280; font-variant-numeric: tabular-nums; }
    .rec-risky { color: #f59e0b; }
    /* Debug section */
    .event-list {
      max-height: 150px; overflow-y: auto;
      background: #0f1117; border-radius: 4px;
      font-family: monospace; font-size: 11px;
    }
    .event-item {
      padding: 4px 8px; border-bottom: 1px solid #1a1f2e;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .event-item:last-child { border-bottom: none; }
    .event-ts { color: #4b5563; flex-shrink: 0; }
    .event-body { color: #94a3b8; word-break: break-all; }
    .conf-high { color: #10b981; }
    .conf-mid { color: #f59e0b; }
    .conf-low { color: #ef4444; }
    .debug-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    /* Reconcile section */
    .rec-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .rec-table th { color: #64748b; text-align: left; padding: 3px 4px; font-weight: 500; }
    .rec-table td { padding: 3px 4px; border-top: 1px solid #1e2535; }
    .diff-ok { color: #10b981; }
    .diff-warn { color: #f59e0b; }
    .diff-error { color: #ef4444; }
    .reconcile-actions { display: flex; gap: 6px; margin-bottom: 8px; }
    .open-companion { display: block; text-align: center; color: #a78bfa; font-size: 12px; text-decoration: none; padding: 4px; }
    .open-companion:hover { color: #c4b5fd; }
    .parse-failures { max-height: 80px; overflow-y: auto; font-size: 11px; color: #ef4444; margin-top: 4px; }
    .hidden { display: none; }
    .copy-btn { font-size: 10px; padding: 2px 6px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Hedge Ledger Companion</span>
    <a class="open-companion" id="open-companion-link" href="#" target="_blank">Open Companion</a>
  </div>

  <!-- Status Row -->
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-label">Status:</span>
    <span class="status-value" id="status-text">--</span>
  </div>

  <!-- Hunt Info -->
  <div class="hunt-info">
    <div class="hunt-stat">
      <div class="hunt-stat-label">Hunt ID</div>
      <div class="hunt-stat-value" id="hunt-id">--</div>
    </div>
    <div class="hunt-stat">
      <div class="hunt-stat-label">Turn</div>
      <div class="hunt-stat-value" id="turn-counter">--</div>
    </div>
    <div class="hunt-stat">
      <div class="hunt-stat-label">Queue</div>
      <div class="hunt-stat-value" id="http-queue">0</div>
    </div>
  </div>

  <!-- Session Token -->
  <section>
    <div class="section-title">Session Token</div>
    <div class="input-row">
      <input type="text" id="token-input" placeholder="Paste token from companion page..." />
      <button class="btn btn-primary btn-sm" id="save-token-btn">Save</button>
      <button class="btn btn-ghost btn-sm copy-btn" id="copy-token-btn">Copy</button>
    </div>
    <div style="margin-top:6px;">
      <div class="section-title" style="margin-bottom:4px;">Backend Host</div>
      <div class="input-row">
        <input type="text" id="host-input" placeholder="https://your-app.replit.app" />
        <button class="btn btn-ghost btn-sm" id="save-host-btn">Set</button>
      </div>
    </div>
  </section>

  <!-- Recommendation Card -->
  <section id="rec-section">
    <div class="section-title">Recommendation</div>
    <div class="rec-card" id="rec-card">
      <div class="rec-empty" id="rec-empty">Waiting for turn data...</div>
      <div id="rec-content" class="hidden">
        <div class="rec-best">
          <div>
            <div class="rec-move" id="rec-move">--</div>
            <div class="rec-target" id="rec-target">--</div>
          </div>
          <div>
            <div class="rec-score" id="rec-score">--</div>
            <div class="rec-score-label">score</div>
          </div>
        </div>
        <div class="rec-tags" id="rec-tags"></div>
        <div class="rec-alts" id="rec-alts">
          <div class="rec-alt-row">
            <span class="rec-alt-label">2nd best:</span>
            <span class="rec-alt-name" id="rec-alt2">--</span>
            <span class="rec-alt-score" id="rec-alt2-score"></span>
          </div>
          <div class="rec-alt-row">
            <span class="rec-alt-label rec-risky">Risky:</span>
            <span class="rec-alt-name rec-risky" id="rec-risky">--</span>
            <span class="rec-alt-score" id="rec-risky-score"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Mode Toggles -->
  <section>
    <div class="section-title">Modes</div>
    <div class="toggle-row">
      <span class="toggle-label">Debug Mode</span>
      <label class="toggle">
        <input type="checkbox" id="debug-toggle" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Reconcile Mode</span>
      <label class="toggle">
        <input type="checkbox" id="reconcile-toggle" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </section>

  <!-- Debug Section -->
  <section id="debug-section" class="hidden">
    <div class="section-title">Debug — Recent Events</div>
    <div class="event-list" id="event-list"></div>
    <div class="parse-failures" id="parse-failures"></div>
    <div class="debug-actions">
      <button class="btn btn-ghost btn-sm" id="export-btn">Export JSON</button>
      <button class="btn btn-ghost btn-sm" id="copy-snapshot-btn">Copy Latest</button>
      <button class="btn btn-danger btn-sm" id="clear-btn">Clear</button>
    </div>
  </section>

  <!-- Reconcile Section -->
  <section id="reconcile-section" class="hidden">
    <div class="section-title">Reconciliation</div>
    <div class="reconcile-actions">
      <button class="btn btn-primary btn-sm" id="reconcile-btn">Reconcile Current Panel</button>
    </div>
    <div id="reconcile-status" style="font-size:12px;color:#64748b;margin-bottom:6px;"></div>
    <div id="reconcile-result-wrapper" class="hidden">
      <table class="rec-table">
        <thead>
          <tr>
            <th>Field</th><th>Observed</th><th>Expected</th><th>Delta</th><th>Cause</th>
          </tr>
        </thead>
        <tbody id="reconcile-table-body"></tbody>
      </table>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
